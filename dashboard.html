<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>IRO Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#f4f6f9;
}

.sidebar{
height:100vh;
background:#0d6efd;
color:white;
padding:20px;
}
.sidebar h3{
text-align:center;
margin-bottom:30px;
}
.sidebar a{
display:block;
color:white;
text-decoration:none;
padding:10px;
margin-bottom:10px;
border-radius:5px;
}
.sidebar a:hover{
background:white;
color:#0d6efd;
}
.card{
box-shadow:0 5px 15px rgba(0,0,0,.1);
}

</style>

</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <div class="col-md-2 sidebar">
                <img src="/image/IRO_Logo.png" alt="IRO Logo" width="55" height="55" class="me-2 rounded-circle">
                <h3>IRO</h3>
                <a href="/index.html">Home</a>
                <a href="#">Reports</a>
                <a href="#">Users</a>
                <a href="/login.html">Logout</a>
            </div>
            <div class="col-md-10 p-4">
                <h2>Administrator Dashboard</h2>
                <div class="row mt-4">
                    <div class="col-md-4">
                        <div class="card text-center">
                            <div class="card-body">
                                <h5>Total Reports</h5>
                                <h2>25</h2>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="card text-center">
                            <div class="card-body">
                                <h5>Pending</h5>
                                <h2>10</h2>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="card text-center">
                            <div class="card-body">
                                <h5>Resolved</h5>
                                <h2>15</h2>
                            </div>
                        </div>
                    </div>
                </div>
                <hr>
                <h3>Reported Issues</h3>
                <table class="table table-bordered table-hover">
                    <thead class="table-primary">
                        <tr>
                            <th>Issue</th>
                            <th>Reporter</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td>Bad Road</td>
                            <td>Bola</td>
                            <td><span class="badge bg-warning">Pending</span></td>
                            <td>
                                <button class="btn btn-info btn-sm">View</button>
                                <button class="btn btn-success btn-sm">Edit</button>
                                <button class="btn btn-danger btn-sm">Delete</button>
                            </td>
                        </tr>
                        <tr>
                            <td>Water Supply</td>
                            <td>Musa</td>
                            <td><span class="badge bg-success">Resolved</span></td>
                            <td>
                                <button class="btn btn-info btn-sm">View</button>
                                <button class="btn btn-success btn-sm">Edit</button>
                                <button class="btn btn-danger btn-sm">Delete</button>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

</body>
</html>
