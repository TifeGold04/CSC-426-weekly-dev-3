<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>IRO | Register</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body{
            background:linear-gradient(135deg,#0d6efd,#5fa8ff);
            font-family:Arial, Helvetica, sans-serif;
        }

        .register-card{

            max-width:650px;

            margin:40px auto;

            background:#fff;

            padding:35px;

            border-radius:15px;

            box-shadow:0 10px 25px rgba(0,0,0,.2);

        }

        .logo{

            width:90px;

            display:block;

            margin:auto;

            margin-bottom:15px;

        }

        h2{

            text-align:center;

            color:#0d6efd;

            margin-bottom:25px;

        }

        .btn-register{

            width:100%;

            height:50px;

            font-size:18px;

        }

    </style>

</head>

<body>

<div class="container">

<div class="register-card">

<img src="/image/IRO_Logo.png"
class="logo"
alt="IRO Logo">

<h2>Create an IRO Account</h2>

<!-- Flash Messages -->

<!-- {% with messages = get_flashed_messages() %}
{% if messages %} -->

<div class="alert alert-success">

<!-- {% for message in messages %}

{{ message }}

{% endfor %} -->

</div>

<!-- {% endif %}
{% endwith %} -->

<form action="{{ url_for('register') }}" method="POST">

<div class="row">

<div class="col-md-6 mb-3">

<label class="form-label">

Full Name

</label>

<input
type="text"
class="form-control"
name="fullname"
placeholder="Enter Full Name"
required>

</div>

<div class="col-md-6 mb-3">

<label class="form-label">

Email Address

</label>

<input
type="email"
class="form-control"
name="email"
placeholder="Enter Email"
required>

</div>

</div>

<div class="row">

<div class="col-md-6 mb-3">

<label class="form-label">

Phone Number

</label>

<input
type="text"
class="form-control"
name="phone"
placeholder="Enter Phone Number"
required>

</div>

<div class="col-md-6 mb-3">

<label class="form-label">

Category

</label>

<select
class="form-select"
name="role"
required>

<option value="">Select Category</option>

<option value="Student">

Student

</option>

<option value="Community Indigene">

Community Indigene

</option>

</select>

</div>

</div>

<div class="mb-3">

<label class="form-label">

Password

</label>

<input
type="password"
class="form-control"
name="password"
placeholder="Create Password"
required>

</div>

<div class="mb-3">

<label class="form-label">

Confirm Password

</label>

<input
type="password"
class="form-control"
id="confirmPassword"
placeholder="Confirm Password"
required>

</div>

<div class="d-grid">

<button
type="submit"
class="btn btn-primary btn-register">

Register

</button>

</div>

</form>

<hr>

<div class="text-center">

Already have an account?

<a href="/login.html">

Login Here

</a>

</div>

<div class="text-center mt-2">

<a href="/index.html">

← Back to Home

</a>

</div>

</div>

</div>

<script>

const form=document.querySelector("form");

form.addEventListener("submit",function(e){

let password=document.querySelector("input[name='password']").value;

let confirm=document.getElementById("confirmPassword").value;

if(password!==confirm){

e.preventDefault();

alert("Passwords do not match!");

}

});

</script>

</body>

</html>
