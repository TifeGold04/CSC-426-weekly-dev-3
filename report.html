<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Report Issue</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    background-color:#f4f6f9;
    position:relative;
}

body::before{

    content:"";

    position:fixed;

    top:0;
    left:0;

    width:100%;
    height:100%;

    background:url("/image/IRO_Logo.png") no-repeat center;

    background-size:400px;

    opacity:0.08;

    z-index:-1;

}

.form-box{
max-width:700px;
margin:50px auto;
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,.2);
}
</style>

</head>
<body>
    <div class="container">
        <div class="form-box">
            <img src="/image/IRO_Logo.png" alt="IRO Logo" width="55" height="55" class="me-2 rounded-circle">
            <h2 class="text-center text-primary">Report an Issue</h2>
            <form id="reportForm">
                <div class="mb-3">
                    <label>Name</label>
                    <input type="text" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label>Email</label>
                    <input type="email" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label>Phone Number</label>
                    <input type="text" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label>Category</label>
                    <select class="form-select">
                        <option>Student</option>
                        <option>Community Indigene</option>
                    </select>
                </div>
                <div class="mb-3">
                    <label>Location</label>
                    <select class="form-select">
                        <option>Akungba</option>
                        <option>Iwaro</option>
                        <option>Etioro</option>
                        <option>Ayegunle</option>
                    </select>
                </div>
                <div class="mb-3">
                    <label>Description</label>
                    <textarea class="form-control" rows="5" required></textarea>
                </div>
                <div class="mb-3">
                    <label>Upload Image</label>
                    <input type="file" class="form-control">
                </div>
                <button class="btn btn-primary w-100">Submit</button>
                <button class="btn btn-white w-5"> <a href="/user.html"> <<--Go Back Home</a></button>
            </form>
        </div>
    </div>

<script>
document.getElementById("reportForm").addEventListener("submit",function(e){e.preventDefault();
alert("Issue Submitted Successfully!");
this.reset();
});
</script>

</body>
</html>
