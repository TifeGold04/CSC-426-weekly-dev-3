<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IRO Admin Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background:#f4f6f9;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .login-box{
            width:400px;
            background:white;
            padding:30px;
            border-radius:10px;
            box-shadow:0 5px 15px rgba(0,0,0,.2);
        }

        h2{
            text-align:center;
            color:#0d6efd;
            margin-bottom:25px;
        }

        .btn-primary{
            width:100%;
        }

        .logo{
            text-align:center;
            font-size:50px;
        }
    </style>

</head>
<body>
    <div class="login-box">
        <div class="logo">🛡
            <img src="/image/IRO_Logo.png" alt="IRO Logo" width="55" height="55" class="me-2 rounded-circle">
        </div>
        <h2>IRO Admin Login</h2>
        <form id="loginForm">
            <div class="mb-3">
                <label class="form-label">Username</label>
                <input type="text" class="form-control" id="username" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Password</label>
                <input type="password" class="form-control" id="password" required>
            </div>
            <button class="btn btn-primary">Login</button>
        </form>
    </div>

<script>
document.getElementById("loginForm").addEventListener("submit",function(e){e.preventDefault();
let username=document.getElementById("username").value;
let password=document.getElementById("password").value;
if(username=="admin" && password=="admin123"){
alert("Login Successful");
window.location="dashboard.html";
}else{
alert("Invalid Username or Password");
}
});
</script>

</body>
</html>
